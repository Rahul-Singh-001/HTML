<!DOCTYPE html>
    <html lang="en">
        <head>
            <title>signup</title>
            <meta name="viewport"  content="width=device-width,initial-scale=1.0">
            <meta charset="UTF-8">
        </head>
        <style>
            *{
                box-sizing:border-box;
            }
            body{
                height: 100vh;
                display:flex;
                margin:0;
                background-color: bisque;
                justify-content:center;
                align-items:center;
                font-family: Arial, Helvetica, sans-serif;
            }
            .signup h2{
                text-align:center;
                margin-bottom:20px;
            }
            .wrapper{
                width:700px;
                height:400px;
                display:flex;
                border-radius: 12px;
                background-color: white;
                box-shadow:0 10px 25px rgba(0,0,0,0.1);
                overflow:hidden
            }
            .signup label{
                display:block;
                margin:6px;
            }
            .signup input,button{
                width:100%;
                margin-bottom: 15px;
                padding:14px;
                border:none
            }
            .signup input{
                border-bottom:1px solid black;
                outline:none;
            }
            .signup input:hover{
                border-bottom-color:purple;
            }
            .signup button{
                background-color:rgb(178, 119, 233);
                border-radius:4px
            }
            .signup button:hover{
                 background-color: rgb(195, 138, 224);
            }
            .signup{
                 flex:1;
                 width:300px;
                 padding:20px 40px;
                 box-shadow:0 10px 25px rgba(0,0,0,0.1);
            }
            .card{
                flex:1;
                background:linear-gradient(135deg,#8e2de2,#4a00e0);
                position: relative;
                display:flex;
                flex-direction:column;
                justify-content:center;
                align-items:center;
                text-align: center;
                color:white;
            }
            .card::before{
                content:"";
                position:absolute;
                border-radius:50%;
                height: 250px;
                width:250px;
                background: rgba(255,255,255,0.15);
                left:-60px;
                bottom:-60px;
            }
             .card::after{
                content:"";
                position:absolute;
                border-radius:50%;
                height: 200px;
                width:200px;
                background: rgba(255,255,255,0.15);
                right: -60px;
                top:-60px;
            }
            .card h2{
               margin-bottom: 20px;
            }
            .card a{
                color:white
            }

        </style>
        <body>
            <div class="wrapper">
                <div class="signup">
                    <h2>Signup</h2>
                    <div>
                    <form>
                        <label for="email">Email</label> 
                        <input type="email" name="email" placeholder="Enter your email.." id="email" required>
                        <label for="password">Password</label>
                        <input type="password" name="password" placeholder="Enter strong password.." id="password" required>
                        <button type="submit">Submit</button>
                    </form>
                    </div>
                </div>
                <div class="card">
                     <h2>Already have an account?</h2>
                     <a href="login.html">Login</a>
                </div>
            </div>
        </body>
    </html>
